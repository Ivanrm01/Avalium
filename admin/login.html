<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Avalium · Acceso al panel</title>
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0A1F33; --navy-soft:#13283d; --cream:#F5EFE3; --cream-deep:#EDE5D3;
  --terracotta:#C75D2C; --terracotta-deep:#A84A1F; --brass:#B8895C; --muted:#8c99a6;
  --font-display:'Fraunces',serif; --font-body:'DM Sans',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-body);color:var(--cream);
  background:radial-gradient(120% 120% at 50% -10%, #13283d 0%, var(--navy) 60%);
  display:flex;align-items:center;justify-content:center;padding:1.5rem;-webkit-font-smoothing:antialiased;
}
.card{width:100%;max-width:400px;text-align:center}
.logo{height:62px;width:auto;margin:0 auto 2rem;display:block}
.eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--brass);font-weight:700}
h1{font-family:var(--font-display);font-weight:500;font-size:1.6rem;margin:.5rem 0 1.8rem;color:var(--cream);letter-spacing:-.01em}

form{display:flex;flex-direction:column;gap:.9rem;text-align:left}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin-bottom:.4rem;letter-spacing:.02em}
.field input{
  width:100%;padding:.85rem 1rem;border-radius:11px;border:1px solid rgba(245,239,227,.16);
  background:rgba(245,239,227,.04);color:var(--cream);font-family:var(--font-body);font-size:1rem;outline:none;transition:border-color .15s,box-shadow .15s;
}
.field input::placeholder{color:rgba(140,153,166,.6)}
.field input:focus{border-color:var(--terracotta);box-shadow:0 0 0 3px rgba(199,93,44,.22)}

button{
  margin-top:.4rem;padding:.95rem 1rem;border-radius:11px;background:var(--terracotta);color:#fff;
  font-family:var(--font-body);font-weight:700;font-size:1rem;cursor:pointer;transition:background .15s,opacity .15s;
}
button:hover{background:var(--terracotta-deep)}
button:disabled{opacity:.6;cursor:default}
button:focus-visible{outline:2px solid var(--cream);outline-offset:2px}

.error{min-height:1.2rem;font-size:.85rem;color:#f4a89a;text-align:center;margin-top:.2rem}
.foot{margin-top:2rem;font-size:.74rem;color:var(--muted)}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/assets/logo-cream.png" alt="Avalium" onerror="this.onerror=null;this.src='/assets/logo-white.png'">
    <div class="eyebrow">Área privada</div>
    <h1>Panel de administración</h1>

    <form id="loginForm" autocomplete="on">
      <div class="field">
        <label for="user">Usuario</label>
        <input type="text" id="user" name="user" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" id="submit">Entrar</button>
      <div class="error" id="error" role="alert"></div>
    </form>

    <div class="foot">Avalium Consulting Group, S.L.</div>
  </main>

<script>
(function(){
  var form=document.getElementById('loginForm'),
      btn=document.getElementById('submit'),
      err=document.getElementById('error');

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    err.textContent='';
    btn.disabled=true; btn.textContent='Entrando…';
    try{
      var res = await fetch('/api/admin-login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          user: document.getElementById('user').value,
          password: document.getElementById('password').value
        })
      });
      if(res.ok){
        window.location.href = '/admin';
        return;
      }
      var data={}; try{ data = await res.json(); }catch(_){}
      err.textContent = data.error || 'No se pudo iniciar sesión.';
    }catch(_){
      err.textContent = 'Error de conexión. Inténtalo de nuevo.';
    }
    btn.disabled=false; btn.textContent='Entrar';
  });
})();
</script>
</body>
</html>
