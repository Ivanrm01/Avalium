<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Avalium · Panel de administración</title>
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0A1F33; --navy-soft:#16304a; --cream:#F5EFE3; --cream-deep:#EDE5D3;
  --terracotta:#C75D2C; --brass:#B8895C; --muted:#8b98a6; --line:rgba(255,255,255,.1);
  --font-display:'Fraunces',serif; --font-body:'DM Sans',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-body);background:var(--cream);display:flex;overflow:hidden}

/* Sidebar */
.sidebar{
  width:250px;flex:0 0 250px;background:var(--navy);color:var(--cream);
  display:flex;flex-direction:column;padding:1.4rem 1rem;border-right:1px solid var(--line);
}
.brand{padding:.3rem .4rem 1.4rem;border-bottom:1px solid var(--line);margin-bottom:1.1rem}
.brand img{width:100%;max-width:150px;height:auto;display:block}

.nav{display:flex;flex-direction:column;gap:.35rem}
.navitem{
  position:relative;display:flex;align-items:center;gap:.7rem;width:100%;text-align:left;
  padding:.7rem .8rem;border-radius:10px;font-family:var(--font-body);font-weight:600;font-size:.92rem;
  color:var(--muted);background:transparent;transition:all .18s;cursor:pointer;
}
.navitem:hover{color:var(--cream);background:rgba(255,255,255,.04)}
.navitem.on{background:var(--navy-soft);color:var(--cream)}
.navitem.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;border-radius:3px;background:var(--terracotta)}
.navitem svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;flex:0 0 auto}
.navitem:focus-visible{outline:2px solid var(--terracotta);outline-offset:2px}

.sidefoot{margin-top:auto;display:flex;flex-direction:column;gap:.15rem;padding-top:1rem;border-top:1px solid var(--line)}
.sidelink{display:flex;align-items:center;gap:.6rem;padding:.55rem .8rem;border-radius:9px;font-size:.85rem;font-weight:500;color:var(--muted);transition:all .15s}
.sidelink:hover{color:var(--cream);background:rgba(255,255,255,.04)}
.sidelink svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;flex:0 0 auto}

/* Main */
main{flex:1;position:relative;background:var(--cream)}
.frame{position:absolute;inset:0;width:100%;height:100%;border:none;background:var(--cream)}
.frame.hidden{display:none}
.loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--navy);font-family:var(--font-display);font-size:1rem;background:var(--cream)}
.loading.hidden{display:none}

/* Rail compacto en pantallas pequeñas */
@media(max-width:720px){
  .sidebar{width:64px;flex-basis:64px;padding:1rem .55rem;align-items:center}
  .brand{border-bottom:none;padding:.2rem 0 1rem;margin-bottom:.6rem}
  .brand img{display:none}
  .brand::after{content:"A";font-family:var(--font-display);font-weight:600;font-size:1.5rem;color:var(--cream)}
  .navitem{justify-content:center;padding:.7rem;gap:0}
  .navitem span,.sidelink span{display:none}
  .navitem.on::before{display:none}
  .sidelink{justify-content:center;padding:.6rem}
}
</style>
</head>
<body>

  <aside class="sidebar">
    <div class="brand">
      <img src="/assets/logo-cream.png" alt="Avalium" onerror="this.onerror=null;this.src='/assets/logo-white.png'">
    </div>

    <nav class="nav" role="tablist" aria-label="Secciones del panel">
      <button id="tab-blog" class="navitem on" role="tab" aria-selected="true" aria-controls="f-blog">
        <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span>Blog</span>
      </button>
      <button id="tab-calc" class="navitem" role="tab" aria-selected="false" aria-controls="f-calc">
        <svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="8" y2="10"/><line x1="12" y1="10" x2="12" y2="10"/><line x1="16" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg>
        <span>Calculadora de garantías</span>
      </button>
    </nav>

    <div class="sidefoot">
      <a class="sidelink" id="openTab" href="#" target="_blank" rel="noopener" title="Abrir la sección actual en una pestaña completa">
        <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        <span>Abrir completa</span>
      </a>
      <a class="sidelink" href="/" target="_blank" rel="noopener" title="Ver la web pública">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span>Ver web</span>
      </a>
      <a class="sidelink" href="/api/admin-logout" title="Cerrar sesión">
        <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Salir</span>
      </a>
    </div>
  </aside>

  <main>
    <div class="loading" id="loading">Cargando…</div>
    <iframe id="f-blog" class="frame" title="Gestión del blog" src="/admin/cms.html"></iframe>
    <iframe id="f-calc" class="frame hidden" title="Calculadora de garantías" data-src="/admin/calculadora.html"></iframe>
  </main>

<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var tabBlog=$('tab-blog'), tabCalc=$('tab-calc');
  var fBlog=$('f-blog'), fCalc=$('f-calc'), loading=$('loading'), openTab=$('openTab');
  var current='blog';

  fBlog.addEventListener('load', function(){ if(current==='blog') loading.classList.add('hidden'); });
  fCalc.addEventListener('load', function(){ if(current==='calc') loading.classList.add('hidden'); });

  function show(which){
    current=which;
    var blog = which==='blog';
    tabBlog.classList.toggle('on', blog); tabBlog.setAttribute('aria-selected', blog);
    tabCalc.classList.toggle('on', !blog); tabCalc.setAttribute('aria-selected', !blog);
    fBlog.classList.toggle('hidden', !blog);
    fCalc.classList.toggle('hidden', blog);
    if(!blog && !fCalc.src){ loading.classList.remove('hidden'); fCalc.src = fCalc.dataset.src; }
    else { loading.classList.add('hidden'); }
    openTab.href = blog ? '/admin/cms.html' : '/admin/calculadora.html';
  }

  tabBlog.addEventListener('click', function(){ show('blog'); });
  tabCalc.addEventListener('click', function(){ show('calc'); });
  openTab.href = '/admin/cms.html';
})();
</script>
</body>
</html>
